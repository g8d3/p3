<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>s82 Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,monospace;background:#0d1117;color:#c9d1d9;font-size:14px;padding:0}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 16px;position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center}
.header h1{color:#58a6ff;font-size:18px}
.header .ts{color:#484f58;font-size:11px}
.stats{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid #21262d;flex-wrap:wrap}
.stat{border:1px solid #30363d;border-radius:6px;padding:8px 16px;text-align:center;flex:1;min-width:80px;background:#161b22}
.stat .n{font-size:20px;font-weight:bold;color:#58a6ff}
.stat .l{font-size:10px;color:#8b949e;text-transform:uppercase}
.tabs{display:flex;gap:0;padding:0 16px;border-bottom:1px solid #30363d;overflow-x:auto}
.tab{padding:10px 16px;cursor:pointer;color:#8b949e;border-bottom:2px solid transparent;font-size:13px;white-space:nowrap}
.tab:hover{color:#c9d1d9}
.tab.active{color:#58a6ff;border-bottom-color:#58a6ff}
.panel{display:none;padding:8px 16px}
.panel.active{display:block}
.panel h2{color:#8b949e;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin:12px 0 4px}
.table-wrap{overflow-x:auto;max-height:55vh;overflow-y:auto;border:1px solid #30363d;border-radius:6px;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:2}
th{background:#161b22;color:#8b949e;font-weight:600;padding:8px 10px;text-align:left;border-bottom:2px solid #30363d;white-space:nowrap}
td{padding:6px 10px;border-bottom:1px solid #21262d;white-space:nowrap}
tr:hover td{background:#1c2333}
.pagination{padding:8px 0;display:flex;gap:8px;align-items:center;font-size:12px;color:#8b949e}
.pagination button,.btn{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px}
.pagination button:hover,.btn:hover{background:#30363d}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:8px 0}
.toolbar select{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:4px 8px;border-radius:4px;font-size:12px}
.badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600}
.b-active{background:#1b4a1b;color:#3fb950} .b-idle{background:#4a3b1b;color:#d29922}
.b-stuck{background:#4a1b1b;color:#f85149} .b-never{background:#1b1b1b;color:#484f58}
.b-long{background:#1b4a1b;color:#3fb950} .b-short{background:#4a1b1b;color:#f85149}
.b-neutral{background:#4a3b1b;color:#d29922}
.tree-row td:first-child{padding-left:24px;color:#8b949e}
.tree-root td{font-weight:bold;color:#c9d1d9}
.notice{color:#484f58;font-size:12px;padding:20px;text-align:center}
</style>
</head>
<body>
<div class="header"><h1>s82 Dashboard</h1><span class="ts" id="ts"></span></div>
<div class="stats" id="stats"></div>
<div class="tabs" id="tabs">
  <div class="tab active" data-panel="agents">Agents</div>
  <div class="tab" data-panel="goals">Goals</div>
  <div class="tab" data-panel="log">Log</div>
</div>

<div class="panel active" id="panel-agents">
  <h2>Agents</h2>
  <div class="toolbar">
    <select id="agent-filter" onchange="load()">
      <option value="all">All</option>
      <option value="real">Real agents</option>
      <option value="workers">Workers</option>
      <option value="stale">Stale</option>
    </select>
    <button class="btn" onclick="exportCsv('agents-t')">📋 CSV</button>
    <span id="agent-count" style="color:#484f58;font-size:12px"></span>
  </div>
  <div class="table-wrap" id="agents-t"></div>
</div>

<div class="panel" id="panel-goals">
  <h2>Agent Pipelines</h2>
  <div id="goals-content"></div>
  <h2 style="margin-top:20px">Goal Tree</h2>
  <div class="table-wrap" id="goals-t"></div>
</div>

<div class="panel" id="panel-log">

<div class="panel" id="panel-log">
  <h2>System Log</h2>
  <div class="toolbar">
    <button class="btn" onclick="exportCsv('log-t')">📋 CSV</button>
    <span id="log-count" style="color:#484f58;font-size:12px"></span>
  </div>
  <div class="table-wrap" id="log-t"></div>
</div>

<script>
// ── Single renderTable function used by ALL tables ──
let _pages = {};
function renderTable(containerId, data, columns, opts={}){
  const perPage = opts.perPage || 20;
  const page = _pages[containerId] || 0;
  const totalPages = Math.max(1, Math.ceil(data.length / perPage));
  const start = page * perPage;
  const pageData = data.slice(start, start + perPage);
  const container = document.getElementById(containerId);
  let html = '<table id="'+containerId+'-t"><thead><tr>';
  columns.forEach(c => { html += '<th>' + (c.label || c.key) + '</th>'; });
  html += '</tr></thead><tbody>';
  pageData.forEach(row => {
    const cls = (row._tree) ? ' class="' + row._tree + '"' : '';
    html += '<tr' + cls + '>';
    columns.forEach(c => {
      let val = c.fn ? c.fn(row) : (row[c.key] !== undefined ? esc(row[c.key]) : '');
      html += '<td>' + val + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  if(totalPages > 1){
    html += '<div class="pagination">';
    html += '<button onclick="pageGo(\''+containerId+'\',0)">«</button>';
    html += '<button onclick="pageGo(\''+containerId+'\','+(page-1)+')" '+(page===0?'disabled':'')+'>◀</button>';
    html += '<span>'+(page+1)+'/'+totalPages+'</span>';
    html += '<button onclick="pageGo(\''+containerId+'\','+(page+1)+')" '+(page>=totalPages-1?'disabled':'')+'>▶</button>';
    html += '<button onclick="pageGo(\''+containerId+'\','+(totalPages-1)+')">»</button>';
    html += '</div>';
  }
  container.innerHTML = html;
}
function pageGo(id, p){
  _pages[id] = Math.max(0, p);
  load();
}
function esc(t){ return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function exportCsv(tableId){
  const el = document.getElementById(tableId);
  if(!el) return;
  let rows = [];
  el.querySelectorAll('tr').forEach(tr => {
    let cells = [];
    tr.querySelectorAll('th,td').forEach(td => cells.push('"'+td.textContent.trim().replace(/"/g,'""')+'"'));
    rows.push(cells.join(','));
  });
  navigator.clipboard.writeText(rows.join('\n')).then(() => alert('Copied '+rows.length+' rows'));
}

// Tab switching
document.getElementById('tabs').addEventListener('click', function(e){
  const tab = e.target.closest('.tab'); if(!tab) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('panel-'+tab.dataset.panel).classList.add('active');
});

function pipelineHtml(agent, pipe){
  if(!pipe || !pipe.pipeline) return '';
  let html = '<div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;margin:12px 0">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  html += '<strong style="color:#58a6ff;font-size:15px">'+esc(agent)+'</strong>';
  html += '<span style="font-size:11px;color:#8b949e">'+esc(pipe.latest||'')+'</span>';
  html += '</div>';
  // Metrics
  if(pipe.metrics){
    html += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px;font-size:11px">';
    for(const [k,v] of Object.entries(pipe.metrics)){
      html += '<span style="color:#8b949e">'+esc(k)+': <b style="color:#c9d1d9">'+esc(v)+'</b></span>';
    }
    html += '</div>';
  }
  // Pipeline steps as table
  html += '<table style="font-size:12px;width:100%"><tbody>';
  pipe.pipeline.forEach(p => {
    html += '<tr><td style="padding:3px 8px;border:none">'+esc(p.status)+'</td><td style="padding:3px 8px;border:none;color:#8b949e">'+esc(p.step)+'</td></tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

async function load(){
  const r = await fetch('/api/status').then(r=>r.json());
  const agents = r.agents || [];
  const signals = r.signals || {};
  const goals = r.goal_tree || {};
  const ws = r.tmux_windows || [];
  const pipes = r.agent_pipelines || {};

  // Stats bar
  const realAgents = agents.filter(a=>!a.never_active).length;
  const sigCount = (signals.signals||[]).length;
  document.getElementById('stats').innerHTML =
    `<div class="stat"><div class="n">${realAgents}</div><div class="l">Active Agents</div></div>`+
    `<div class="stat"><div class="n">${r.progress.lines||0}</div><div class="l">Doc Lines</div></div>`+
    `<div class="stat"><div class="n">${r.artifacts.count||0}</div><div class="l">Artifacts</div></div>`+
    `<div class="stat"><div class="n">${sigCount}</div><div class="l">Signals</div></div>`+
    `<div class="stat"><div class="n">${r.help_stats.total||0}</div><div class="l">Helps</div></div>`;
  document.getElementById('ts').textContent = new Date().toLocaleTimeString();

  // ── AGENTS TABLE (includes tmux window column) ──
  const filter = document.getElementById('agent-filter').value;
  let filtered = agents;
  if(filter==='real') filtered = agents.filter(a=>!a.never_active);
  else if(filter==='workers') filtered = agents.filter(a=>a.name.startsWith('worker'));
  else if(filter==='stale') filtered = agents.filter(a=>a.never_active);
  document.getElementById('agent-count').textContent = filtered.length + ' agents';
  renderTable('agents-t', filtered, [
    {key:'name', label:'Agent', fn: r => '<b>'+esc(r.name)+'</b>'},
    {key:'role', label:'Role'},
    {key:'status', label:'State', fn: r => {
      if(r.never_active) return '<span class="badge b-never">stale</span>';
      if(r.idle || r.last_s > 120) return '<span class="badge b-idle">idle</span>';
      if(r.last_s > 60) return '<span class="badge b-stuck">stuck</span>';
      return '<span class="badge b-active">active</span>';
    }},
    {key:'last_s', label:'Last (s)'},
    {key:'window', label:'Tmux', fn: r => {
      if(r.window) return '#'+r.window;
      const w = ws.find(w2=>w2.name===r.name);
      return w ? '#'+w.idx : '—';
    }},
    {key:'focus', label:'Current Focus'},
  ], {perPage:15});

  // ── AGENT PIPELINES (per-agent cards with pipeline tables) ──
  let pipesHtml = '';
  for(const [agent, pipe] of Object.entries(pipes)){
    pipesHtml += pipelineHtml(agent, pipe);
  }
  // Also include signals as a metrics table under the trading pipeline
  const sigList = (signals.signals||[]).map(s => ({
    asset: s.asset||'?', direction: s.direction||'?', rsi: s.rsi||'?',
    macd: s.macd||'?', funding: s.funding||'', ob: s.ob_imbalance!==undefined?s.ob_imbalance:'',
    timeframe: s.timeframe || '1H',
    duration: s.duration || (s.first_seen ? Math.round((Date.now()-new Date(s.first_seen).getTime())/60000)+'min' : '—'),
    trend: s.trend || (s.direction==='NEUTRAL'?'flat':s.direction),
    updated: s.updated ? new Date(s.updated).toLocaleTimeString() : (signals.updated ? new Date(signals.updated).toLocaleTimeString() : '?'),
  }));
  if(sigList.length){
    pipesHtml += '<h2 style="margin-top:20px">Current Trading Signals</h2>';
    pipesHtml += '<div class="table-wrap">';
    const tmpId = 'signals-ts-' + Date.now();
    // signals are inside goals tab now
    // inline signals table
    let stable = '<table id="'+tmpId+'"><thead><tr><th>Asset</th><th>Signal</th><th>RSI</th><th>MACD</th><th>Funding</th><th>OB</th><th>TF</th><th>Duration</th><th>Trend</th><th>Updated</th></tr></thead><tbody>';
    sigList.forEach(s => {
      stable += '<tr><td>'+esc(s.asset)+'</td><td><span class="badge '+(s.direction==='LONG'?'b-long':s.direction==='SHORT'?'b-short':'b-neutral')+'">'+esc(s.direction)+'</span></td>';
      stable += '<td>'+esc(s.rsi)+'</td><td>'+esc(s.macd)+'</td><td>'+esc(s.funding)+'</td><td>'+esc(s.ob)+'</td>';
      stable += '<td>'+esc(s.timeframe)+'</td><td>'+esc(s.duration)+'</td><td>'+esc(s.trend)+'</td><td>'+esc(s.updated)+'</td></tr>';
    });
    stable += '</tbody></table></div>';
    pipesHtml += stable;
  }

  document.getElementById('goals-content').innerHTML = pipesHtml || '<div class="notice">No pipeline data yet</div>';

  // ── GOAL TREE as proper table ──
  let goalRows = [];
  for(const [root, g] of Object.entries(goals)){
    goalRows.push({_tree:'tree-root', objective: root, sub:'', status:g.status||'', agent:'', focus:''});
    for(const [sub, s] of Object.entries(g.sub||{})){
      goalRows.push({_tree:'tree-row', objective:'', sub: sub, status: s.status||'', agent: s.agent||'', focus: ''});
    }
  }
  renderTable('goals-t', goalRows, [
    {key:'objective', label:'Objective'},
    {key:'sub', label:'Sub-goal'},
    {key:'status', label:'Status'},
    {key:'agent', label:'Agent'},
  ], {perPage:50});

  // ── LOG TABLE ──
  const logR = await fetch('/api/log').then(r=>r.json());
  const entries = (logR.entries||[]).slice(0,50).map(e => ({
    time: e.t || e.timestamp || '',
    source: e.source || e.agent || 'sys',
    msg: e.msg || e.event || e.detail || ''
  }));
  document.getElementById('log-count').textContent = entries.length + ' entries';
  renderTable('log-t', entries, [
    {key:'time', label:'Time'},{key:'source', label:'Source'},{key:'msg', label:'Message'},
  ], {perPage:25});
}
load();
setInterval(load, 5000);
</script>
</body>
</html>
