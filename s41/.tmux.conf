# ── Local tmux config for this project ──
# Load with: tmux -f .tmux.conf

# ── Prefix (Ctrl+a) ──
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ──
set -g default-terminal "tmux-256color"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -sg escape-time 0

# ── Status bar ──
set -g status-style 'bg=colour235 fg=colour248'
set -g status-left '#[fg=colour46,bold] #S '
set -g status-right '#[fg=colour214] %H:%M '
set -g status-left-length 30

# ── Pane navigation (vim-style) ──
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resizing ──
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Split panes (keep cwd) ──
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Reload config ──
bind r source-file .tmux.conf \; display "Config reloaded"

# ── Copy mode (vim) ──
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -in -selection clipboard 2>/dev/null || pbcopy"

# ── Quick window switch ──
bind -n S-Left previous-window
bind -n S-Right next-window

# ── Activity monitoring ──
setw -g monitor-activity on
set -g visual-activity off
