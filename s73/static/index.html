<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>opencode-go</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0d1117; color: #c9d1d9; height: 100vh; display: flex; }

/* ─── sidebar ─── */
#sidebar { width: 240px; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; flex-shrink: 0; }
#sidebar h2 { font-size: 14px; font-weight: 600; padding: 14px 16px; color: #f0f6fc; border-bottom: 1px solid #30363d; }
#session-list { flex: 1; overflow-y: auto; padding: 8px; }
.session-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-bottom: 4px; color: #8b949e; display: flex; align-items: center; gap: 8px; }
.session-item:hover { background: #21262d; }
.session-item.active { background: #1f6feb22; color: #f0f6fc; border: 1px solid #1f6feb44; }
.session-item .preview { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.session-item .del { opacity: 0; background: none; border: none; color: #8b949e; cursor: pointer; font-size: 16px; padding: 0 4px; }
.session-item:hover .del { opacity: 1; }
.session-item .del:hover { color: #f85149; }
#new-session { margin: 8px; padding: 8px; border-radius: 6px; border: 1px dashed #30363d; background: none; color: #8b949e; cursor: pointer; font-size: 13px; }
#new-session:hover { border-color: #58a6ff; color: #58a6ff; }
.session-warn { padding: 8px 16px; font-size: 12px; color: #8b949e; text-align: center; }

/* ─── main ─── */
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
header { padding: 10px 20px; border-bottom: 1px solid #30363d; background: #161b22; display: flex; align-items: center; gap: 10px; }
header h1 { font-size: 15px; font-weight: 600; color: #f0f6fc; flex: 1; }
header .status { font-size: 11px; color: #8b949e; }
#settings-btn { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 18px; padding: 4px 8px; border-radius: 4px; }
#settings-btn:hover { background: #21262d; color: #f0f6fc; }
#messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.msg { padding: 12px 16px; border-radius: 8px; max-width: 88%; line-height: 1.6; font-size: 14px; white-space: pre-wrap; font-family: inherit; }
.msg.user { background: #1f6feb; color: #fff; align-self: flex-end; }
.msg.assistant { background: #21262d; color: #c9d1d9; align-self: flex-start; border: 1px solid #30363d; }
.msg.assistant code { background: #0d1117; padding: 1px 5px; border-radius: 4px; font-size: 13px; }
.msg.assistant pre { background: #0d1117; padding: 12px; border-radius: 6px; overflow-x: auto; margin: 8px 0; border: 1px solid #30363d; }
.msg.assistant pre code { background: none; padding: 0; }
.msg.cmd { background: #0d1117; color: #58a6ff; align-self: flex-start; border: 1px solid #30363d; font-family: 'SF Mono','Fira Code',monospace; font-size: 13px; }
.msg.result { background: #0d1117; color: #3fb950; align-self: flex-start; border: 1px solid #30363d; font-family: 'SF Mono','Fira Code',monospace; font-size: 13px; max-height: 400px; overflow-y: auto; }
.msg.error { background: #3d1214; color: #ff7b72; align-self: flex-start; border: 1px solid #f85149; }
.msg .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; margin-bottom: 4px; }
.msg.cmd .label { color: #58a6ff; }
.msg.result .label { color: #3fb950; }
.thinking { padding: 12px 16px; color: #8b949e; font-size: 13px; align-self: flex-start; display: flex; align-items: center; gap: 8px; }
.thinking::after { content: ''; width: 12px; height: 12px; border: 2px solid #8b949e; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#input-area { padding: 16px 20px; border-top: 1px solid #30363d; background: #161b22; display: flex; gap: 10px; }
#input { flex: 1; padding: 10px 14px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: #c9d1d9; font-size: 14px; outline: none; font-family: inherit; }
#input:focus { border-color: #1f6feb; }
#send { padding: 10px 20px; border-radius: 6px; border: none; background: #1f6feb; color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; }
#send:disabled { opacity: 0.5; cursor: not-allowed; }
#send:hover:not(:disabled) { background: #388bfd; }
.scroll-btn { display: none; position: fixed; bottom: 80px; right: 24px; background: #21262d; border: 1px solid #30363d; color: #c9d1d9; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 18px; align-items: center; justify-content: center; z-index: 10; }
.scroll-btn:hover { background: #30363d; }

/* ─── settings panel ─── */
#settings-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; }
#settings-panel { display: none; position: fixed; top: 0; right: 0; width: 420px; height: 100vh; background: #161b22; border-left: 1px solid #30363d; z-index: 101; overflow-y: auto; padding: 20px; flex-direction: column; gap: 16px; }
#settings-panel.open { display: flex; }
#settings-overlay.open { display: block; }
#settings-panel h2 { font-size: 16px; font-weight: 600; color: #f0f6fc; margin-bottom: 4px; }
#settings-panel .close { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 20px; align-self: flex-end; }
#settings-panel .close:hover { color: #f0f6fc; }
.settings-group { display: flex; flex-direction: column; gap: 4px; }
.settings-group label { font-size: 12px; font-weight: 500; color: #8b949e; text-transform: uppercase; letter-spacing: .5px; }
.settings-group input, .settings-group textarea { padding: 8px 10px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: #c9d1d9; font-size: 13px; outline: none; font-family: inherit; }
.settings-group input:focus, .settings-group textarea:focus { border-color: #1f6feb; }
.settings-group textarea { min-height: 120px; resize: vertical; font-family: 'SF Mono','Fira Code',monospace; font-size: 12px; }
.settings-group .hint { font-size: 11px; color: #8b949e; }
#save-config { padding: 10px; border-radius: 6px; border: none; background: #1f6feb; color: #fff; font-size: 14px; cursor: pointer; margin-top: 8px; }
#save-config:hover { background: #388bfd; }
#save-config:disabled { opacity: 0.5; cursor: not-allowed; }
#config-status { font-size: 12px; padding: 8px; border-radius: 4px; display: none; }
#config-status.ok { display: block; background: #0d2818; color: #3fb950; border: 1px solid #3fb95044; }
#config-status.err { display: block; background: #3d1214; color: #ff7b72; border: 1px solid #f85149; }

@media (max-width: 700px) { #sidebar { width: 60px; } #sidebar h2, .session-item .preview, #new-session span { display: none; } #settings-panel { width: 100vw; } }
</style>
</head>
<body>
<div id="sidebar">
  <h2>☰ Sessions</h2>
  <div id="session-list"><div class="session-warn">Loading…</div></div>
  <button id="new-session">+ <span>New session</span></button>
</div>
<div id="main">
  <header>
    <h1>⌘ opencode-go</h1>
    <span class="status" id="status-hint">ok</span>
    <button id="settings-btn" title="Settings">⚙</button>
  </header>
  <div id="messages"><div class="msg assistant" style="align-self:flex-start">Send a message to get started.</div></div>
  <button class="scroll-btn" id="scrollBtn" onclick="scrollToBottom()">↓</button>
  <div id="input-area">
    <input type="text" id="input" placeholder="Describe what you want to do…" autofocus />
    <button id="send" onclick="sendMessage()">Send</button>
  </div>
</div>

<!-- settings -->
<div id="settings-overlay" onclick="closeSettings()"></div>
<div id="settings-panel">
  <button class="close" onclick="closeSettings()">✕</button>
  <h2>Settings</h2>
  <div class="settings-group">
    <label>API Key</label>
    <input type="password" id="cfg-api-key" placeholder="sk-..." />
    <span class="hint" id="cfg-api-key-hint"></span>
  </div>
  <div class="settings-group">
    <label>Base URL</label>
    <input id="cfg-base-url" placeholder="https://opencode.ai/zen/go/v1/" />
  </div>
  <div class="settings-group">
    <label>Model</label>
    <input id="cfg-model" placeholder="deepseek-v4-flash" />
  </div>
  <div class="settings-group">
    <label>System Prompt</label>
    <textarea id="cfg-prompt" placeholder="Custom system prompt…"></textarea>
  </div>
  <div class="settings-group">
    <label>Max Iterations</label>
    <input type="number" id="cfg-max-iter" min="1" max="20" />
  </div>
  <div id="config-status"></div>
  <button id="save-config" onclick="saveConfig()">Save Settings</button>
</div>

<script>
// ─── Global error handler ──────────────────────────────────────────────
window.onerror = function(msg, url, line, col, err) {
  addMessageDOM('error', 'JS Error: ' + msg + ' (line ' + line + ')');
  return true;
};
window.addEventListener('unhandledrejection', function(e) {
  addMessageDOM('error', 'Unhandled Promise: ' + e.reason);
});

// ─── State ──────────────────────────────────────────────────────────────
const STORAGE_KEY = 's73_sessions';
let sessions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let currentId = localStorage.getItem('s73_current');
let configCache = null;

const $ = id => document.getElementById(id);
const messagesEl = $('messages');
const sessionListEl = $('session-list');
const inputEl = $('input');
const sendBtn = $('send');
const scrollBtn = $('scrollBtn');

let thinkingEl = null;

// ─── Config helpers ─────────────────────────────────────────────────────

async function loadConfig() {
  try {
    const r = await fetch('/api/config');
    configCache = await r.json();
    $('cfg-api-key-hint').textContent = configCache.api_key_set ? '✓ ' + configCache.api_key : '✗ Not set';
    $('cfg-base-url').value = configCache.base_url || '';
    $('cfg-model').value = configCache.model || '';
    $('cfg-prompt').value = configCache.system_prompt || '';
    $('cfg-max-iter').value = configCache.max_iter || 3;
    $('status-hint').textContent = configCache.api_key_set ? '✓ configured' : '⚠ configure me';
    return configCache;
  } catch (e) {
    $('status-hint').textContent = '⚠ server?';
    $('cfg-api-key-hint').textContent = '✗ offline';
    return null;
  }
}

async function saveConfig() {
  const btn = $('save-config');
  const status = $('config-status');
  btn.disabled = true;
  status.className = '';
  status.textContent = '';
  try {
    const r = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        api_key: $('cfg-api-key').value.trim(),
        base_url: $('cfg-base-url').value.trim(),
        model: $('cfg-model').value.trim(),
        system_prompt: $('cfg-prompt').value,
        max_iter: parseInt($('cfg-max-iter').value) || 3,
      }),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    status.className = 'ok';
    status.textContent = '✓ Saved';
    await loadConfig();
  } catch (e) {
    status.className = 'err';
    status.textContent = '✗ Failed: ' + e.message;
  } finally {
    btn.disabled = false;
    setTimeout(() => { status.className = ''; status.textContent = ''; }, 3000);
  }
}

function openSettings() {
  $('settings-overlay').classList.add('open');
  $('settings-panel').classList.add('open');
  $('cfg-api-key').value = '';
  loadConfig();
}

function closeSettings() {
  $('settings-overlay').classList.remove('open');
  $('settings-panel').classList.remove('open');
}

$('settings-btn').onclick = openSettings;

// ─── Session helpers ────────────────────────────────────────────────────

function persist() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
  if (currentId) localStorage.setItem('s73_current', currentId);
}

function getCurrent() {
  return sessions.find(s => s.id === currentId) || null;
}

function ensureCurrent() {
  let s = getCurrent();
  if (!s) {
    s = { id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2), name: 'Session ' + (sessions.length+1), msgs: [], sid: '' };
    sessions.push(s);
    currentId = s.id;
    persist();
  }
  return s;
}

function switchSession(id) {
  if (thinkingEl) return;
  currentId = id;
  persist();
  renderSessions();
  renderMessages();
  scrollToBottom();
}

function deleteSession(id) {
  const idx = sessions.findIndex(s => s.id === id);
  if (idx === -1 || sessions.length <= 1) return;
  sessions.splice(idx, 1);
  if (currentId === id) currentId = sessions[0].id;
  persist();
  renderSessions();
  renderMessages();
}

function newSession() {
  if (thinkingEl) return;
  const s = { id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2), name: 'Session ' + (sessions.length+1), msgs: [], sid: '' };
  sessions.push(s);
  currentId = s.id;
  persist();
  renderSessions();
  renderMessages();
  inputEl.focus();
}

// ─── Rendering ──────────────────────────────────────────────────────────

function renderSessions() {
  sessionListEl.innerHTML = '';
  for (const s of sessions) {
    const div = document.createElement('div');
    div.className = 'session-item' + (s.id === currentId ? ' active' : '');
    const preview = s.msgs.length > 0 ? s.msgs[0].content : 'empty';
    div.innerHTML = `<span class="preview">${esc(preview.slice(0, 40))}</span><button class="del" onclick="event.stopPropagation();deleteSession('${s.id}')">×</button>`;
    div.onclick = () => switchSession(s.id);
    sessionListEl.appendChild(div);
  }
}

function renderMessages() {
  messagesEl.innerHTML = '';
  const s = getCurrent();
  if (!s) return;
  if (s.msgs.length === 0) {
    messagesEl.innerHTML = '<div class="msg assistant" style="align-self:flex-start">Send a message to get started.</div>';
    return;
  }
  for (const m of s.msgs) {
    addMessageDOM(m.type, m.content);
  }
  scrollToBottom();
}

function addMessageDOM(type, content) {
  if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
  const div = document.createElement('div');
  div.className = 'msg ' + type;

  let html = '';
  if (type === 'cmd')      html = '<div class="label">⚡ command</div>' + esc(content);
  else if (type === 'result') html = '<div class="label">📄 output</div>' + esc(content);
  else if (type === 'error')  html = '<div class="label">✗ error</div>' + esc(content);
  else if (type === 'user')   html = esc(content);
  else if (type === 'assistant') html = formatAssistant(content);

  div.innerHTML = html;
  messagesEl.appendChild(div);
  scrollToBottom();
}

function formatAssistant(text) {
  let s = esc(text);
  s = s.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\n\n/g, '</p><p>');
  s = '<p>' + s + '</p>';
  return s;
}

function showThinking() {
  if (thinkingEl) return;
  thinkingEl = document.createElement('div');
  thinkingEl.className = 'thinking';
  thinkingEl.textContent = 'Thinking';
  messagesEl.appendChild(thinkingEl);
  scrollToBottom();
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
  scrollBtn.style.display = 'none';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ─── Chat ───────────────────────────────────────────────────────────────

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || thinkingEl) return;
  inputEl.value = '';

  const sess = ensureCurrent();

  // add user message locally
  sess.msgs.push({ type: 'user', content: text });
  persist();
  renderMessages();

  sendBtn.disabled = true;
  showThinking();

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: sess.sid }),
    });

    if (!resp.ok) {
      let errBody = '';
      try { errBody = (await resp.json()).error || ''; } catch(e) {}
      throw new Error('Server ' + resp.status + (errBody ? ': ' + errBody : ''));
    }

    if (!resp.body) throw new Error('No response body (stream not supported)');

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      const lines = buf.split('\n');
      buf = lines.pop() || '';

      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ')) {
          const data = line.slice(6).trim();
          handleEvent(eventType, data, sess);
        }
      }
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      addMessageDOM('error', '⚠ ' + err.message);
    }
  } finally {
    sendBtn.disabled = false;
    if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
  }
}

function handleEvent(event, data, sess) {
  const decoded = data.replace(/\\n/g, '\n');
  switch (event) {
    case 'session':
      sess.sid = decoded;
      persist();
      break;
    case 'cmd':
      addMessageDOM('cmd', decoded);
      showThinking();
      break;
    case 'result':
      if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
      addMessageDOM('result', decoded);
      showThinking();
      break;
    case 'assistant':
    case 'done':
      if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
      sess.msgs.push({ type: 'assistant', content: decoded });
      persist();
      addMessageDOM('assistant', decoded);
      renderSessions();
      break;
    case 'error':
      if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
      addMessageDOM('error', decoded);
      break;
  }
}

// ─── Init ───────────────────────────────────────────────────────────────

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
messagesEl.addEventListener('scroll', () => {
  const near = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 100;
  scrollBtn.style.display = near ? 'none' : 'flex';
});
document.getElementById('new-session').addEventListener('click', newSession);

ensureCurrent();
renderSessions();
renderMessages();
loadConfig();
</script>
</body>
</html>
