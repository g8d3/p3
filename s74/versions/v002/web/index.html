<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>VersionApp</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:system-ui,-apple-system,sans-serif;font-size:14px;padding:0}
.toolbar{background:#161b22;border-bottom:1px solid #30363d;padding:8px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-size:13px;position:sticky;top:0;z-index:100}
.toolbar a,.toolbar button{color:#c9d1d9;text-decoration:none;padding:4px 10px;border-radius:4px;border:1px solid #30363d;background:#21262d;cursor:pointer;font-size:12px}
.toolbar a:hover,.toolbar button:hover{background:#30363d}
.toolbar .active{background:rgba(88,166,255,.15);border-color:#58a6ff;color:#58a6ff}
.toolbar .logo{font-weight:700;margin-right:8px}
.toolbar .vbadge{background:#3fb95020;color:#3fb950;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600}
.content{max-width:1280px;margin:auto;padding:20px 16px}
h1{font-size:24px;margin-bottom:4px}
.subtitle{color:#8b949e;margin-bottom:16px}
.row{display:grid;gap:14px;margin-bottom:16px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px}
.card h2{font-size:13px;text-transform:uppercase;color:#8b949e;letter-spacing:.4px;margin-bottom:10px}
.bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:16px}
.bar-item{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:10px 12px}
.bar-item .lbl{font-size:10px;color:#8b949e;text-transform:uppercase}
.bar-item .val{font-size:18px;font-weight:700;margin-top:2px}
.ver-row{display:flex;justify-content:space-between;padding:6px 10px;border:1px solid #30363d;border-radius:6px;margin-bottom:4px;cursor:pointer}
.ver-row:hover{background:#ffffff08}
.ver-row.active{border-color:#3fb950;background:#3fb95010}
.ver-name{font-weight:600}
.ver-active{color:#3fb950;font-size:10px;font-weight:600}
.bm-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:4px;padding:3px 0;font-size:12px;border-bottom:1px solid #30363d10}
.bm-model{font-weight:600}
textarea{width:100%;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:14px;min-height:60px;font-family:inherit;resize:vertical}
textarea:focus{outline:none;border-color:#58a6ff}
.btn{padding:6px 16px;border:1px solid #30363d;border-radius:6px;cursor:pointer;font-size:13px;background:#21262d;color:#c9d1d9}
.btn:hover{background:#30363d}
.btn-ok{border-color:#3fb950;color:#3fb950}
.btn-ok:hover{background:#3fb95020}
.btn-no{border-color:#f85149;color:#f85149}
.btn-primary{border-color:#58a6ff;color:#58a6ff}
.btn-primary:hover{background:#58a6ff20}
.empty{color:#8b949e;font-size:13px;font-style:italic;padding:8px 0}
.diff-box{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px;max-height:300px;overflow:auto;font-family:monospace;font-size:12px;white-space:pre-wrap}
.diff-box .add{color:#3fb950}.diff-box .del{color:#f85149}.diff-box .info{color:#8b949e}
.lb-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #30363d10}
.task{padding:8px 10px;border:1px solid #30363d;border-radius:6px;margin-bottom:6px;background:#ffffff04}
.task-desc{font-weight:600}.task-meta{font-size:11px;color:#8b949e;margin-top:2px}
.ver-desc{font-size:11px;color:#8b949e}
.status{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600}
.s-working{background:#58a6ff20;color:#58a6ff}.s-reviewing{background:#d2992220;color:#d29922}
.s-approved{background:#3fb95020;color:#3fb950}.s-rejected{background:#f8514920;color:#f85149}
</style>
</head>
<body>
<div class="toolbar" id="toolbar"></div>
<div class="content" id="content"></div>
<script>
const WS_PORT = 9879;
let STATE = {};
let VIEW = location.pathname.split("/")[1] || ""; // v003, v002, etc.

function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML}

const ws = new WebSocket("ws://"+location.hostname+":"+WS_PORT);
ws.onmessage = e => { STATE = JSON.parse(e.data); if(STATE.type==="state") render(); };
ws.onopen = () => ws.send(JSON.stringify({type:"get_state"}));
ws.onclose = () => setTimeout(()=>location.reload(),3000);

function render() {
  const s = STATE;
  const version = VIEW && s.versions ? s.versions.find(v=>v.name===VIEW) : null;
  const active = s.active_version || "v001";
  const tasks = s.tasks || [];
  const bm = s.benchmarks || [];
  const vers = s.versions || [];
  const lb = s.leaderboard || [];

  // Toolbar
  const tbar = document.getElementById("toolbar");
  tbar.innerHTML = `<span class="logo">s74</span>` +
    `<a href="/" class="${!version?'active':''}">Inicio</a>` +
    vers.map(v => `<a href="/${v.name}" class="${VIEW===v.name?'active':''}">${v.name}</a>`).join("") +
    (version ? `<span class="vbadge">activo: ${active}</span>` : "") +
    `<button onclick="showNewTask()">+ Tarea</button>` +
    `<button onclick="showBenchmarks()">Benchmarks</button>` +
    `<button onclick="showLeaderboard()">Puntajes</button>`;

  // Content
  const el = document.getElementById("content");
  if (!version) {
    // Home: redirect to active version
    location.href = "/" + active;
    return;
  }

  // Show version dashboard
  const taskItems = tasks.filter(t => !version || t.version_name === version || !t.version_name).slice(0,8).map(t => {
    const sl = {working:"s-working",reviewing:"s-reviewing",approved:"s-approved",rejected:"s-rejected"};
    const sl2 = {working:"trabajando",reviewing:"en revisión",approved:"aprobada",rejected:"rechazada",failed:"error"};
    const actions = t.status==="reviewing" ? `<div style="margin-top:6px;display:flex;gap:6px"><button class="btn btn-ok" onclick="approve('${t.id}')">✓ Aprobar</button><button class="btn btn-no" onclick="reject('${t.id}')">✗ Rechazar</button><button class="btn" onclick="showDiff('${t.id}',this)">Diff</button></div><div class="diff-box" id="diff-${t.id}" style="display:none"></div>` : "";
    return `<div class="task"><div style="display:flex;justify-content:space-between"><span class="task-desc">${esc(t.description)}</span><span class="status ${sl[t.status]||''}">${sl2[t.status]||t.status}</span></div><div class="task-meta">${t.id} ${t.created_at?t.created_at.slice(0,19):''} ${t.version_name?'→ '+t.version_name:''}</div>${actions}</div>`;
  }).join("");

  el.innerHTML = `
    <h1>${esc(version.description || (version.name+' • '+active))}</h1>
    <div class="subtitle">
      <a href="/${active}" style="color:#58a6ff">${active}</a> activo
      · versión ${version.name}
      · ${(s.versions||[]).length} versiones
      · <button class="btn" onclick="showNewTask()">+ Nueva tarea</button>
    </div>
    <div class="bar">
      <div class="bar-item"><div class="lbl">Trabajando</div><div class="val">${tasks.filter(t=>t.status==="working").length}</div></div>
      <div class="bar-item"><div class="lbl">Revisando</div><div class="val">${tasks.filter(t=>t.status==="reviewing").length}</div></div>
      <div class="bar-item"><div class="lbl">Aprobadas</div><div class="val">${tasks.filter(t=>t.status==="approved").length}</div></div>
      <div class="bar-item"><div class="lbl">Versiones</div><div class="val">${vers.length}</div></div>
    </div>
    <div class="row" style="grid-template-columns:1fr 1fr">
      <div class="card">
        <h2>Tareas</h2>
        ${taskItems || '<div class="empty">Sin tareas</div>'}
      </div>
      <div class="card">
        <h2>Versiones</h2>
        ${vers.map(v => `<div class="ver-row ${active===v.name?'active':''}" onclick="switchVer('${v.name}')">
          <div><span class="ver-name">${v.name}</span> ${active===v.name?'<span class="ver-active">activo</span>':''}<div class="ver-desc">${esc(v.description||'')}</div></div>
          <div style="text-align:right;font-size:11px;color:#8b949e">${(v.created_at||'').slice(0,10)}</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="row" style="grid-template-columns:1fr 1fr">
      <div class="card">
        <h2>Benchmarks</h2>
        <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:4px;font-size:11px;color:#8b949e;padding-bottom:4px;border-bottom:1px solid #30363d;margin-bottom:4px"><span>Modelo</span><span style="text-align:right">Latencia</span><span style="text-align:right">Tok in</span><span style="text-align:right">Tok out</span></div>
        ${bm.slice(0,10).map(b => `<div class="bm-row"><span class="bm-model">${b.model}</span><span style="text-align:right;color:#8b949e">${b.duration_ms}ms</span><span style="text-align:right;color:#8b949e">${b.tokens_input||0}</span><span style="text-align:right;color:#8b949e">${b.tokens_output||0}</span></div>`).join('')}
      </div>
      <div class="card">
        <h2>Puntajes</h2>
        ${lb.map((r,i) => `<div class="lb-row"><span>#${i+1} ${esc(r.human_id)}</span><span style="color:#d29922">${r.total} pts</span></div>`).join('') || '<div class="empty">Sin contribuciones</div>'}
      </div>
    </div>
  `;
}

function showNewTask() {
  const desc = prompt("Describe la tarea para el agente:");
  if (!desc) return;
  fetch("/api/tasks", {method:"POST", body:JSON.stringify({description:desc}), headers:{"Content-Type":"application/json"}})
    .then(r=>r.json()).then(d=>alert("Creada: "+d.version));
}

async function approve(tid) { await fetch("/api/tasks/"+tid+"/approve", {method:"POST"}); }
async function reject(tid) { if(confirm("¿Rechazar?")) await fetch("/api/tasks/"+tid+"/reject", {method:"POST"}); }

async function showDiff(tid, btn) {
  const box = document.getElementById("diff-"+tid);
  if(box.style.display!="none"){box.style.display="none";return}
  box.style.display="block";
  const r = await fetch("/diff/"+tid);
  const t = await r.text();
  box.innerHTML = t.split("\n").map(l => {
    if(l.startsWith("+")) return '<span class="add">'+esc(l)+'</span>';
    if(l.startsWith("-")) return '<span class="del">'+esc(l)+'</span>';
    if(l.startsWith("@@")) return '<span class="info">'+esc(l)+'</span>';
    return esc(l);
  }).join("\n") || "(sin cambios)";
}

function switchVer(vname) {
  if(!confirm("¿Cambiar a "+vname+"?")) return;
  fetch("/api/versions/activate", {method:"POST", body:JSON.stringify({version:vname}), headers:{"Content-Type":"application/json"}})
    .then(() => { VIEW = vname; location.href = "/"+vname; });
}
</script>
</body>
</html>
