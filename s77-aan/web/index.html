<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AAN — Agent Network</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;padding:16px}
.container{max-width:1000px;margin:0 auto}
h1{font-size:1.3rem;margin-bottom:16px;color:#58a6ff}
h2{font-size:.9rem;margin-bottom:8px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;margin-bottom:12px;padding:16px}
textarea{width:100%;padding:10px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:.95rem;min-height:60px;margin-bottom:10px}
.btn{display:inline-block;padding:10px 20px;background:#238636;border:none;border-radius:6px;color:#fff;font-weight:600;cursor:pointer;font-size:.9rem}
.btn:hover{background:#2ea043}
.btn:disabled{opacity:.5;cursor:not-allowed}
.feed{max-height:400px;overflow-y:auto}
.entry{padding:10px;border-bottom:1px solid #21262d;font-size:.85rem;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.entry:last-child{border:none}
.vid{color:#58a6ff;font-weight:600}
.task{color:#c9d1d9;flex:1}
.tag{padding:2px 8px;border-radius:10px;font-size:.75rem}
.trun{background:#1f6feb22;color:#58a6ff;border:1px solid #1f6feb}
.tdon{background:#23863622;color:#3fb950;border:1px solid #238636}
.tfail{background:#da363322;color:#f85149;border:1px solid #da3633}
.time{color:#8b949e;font-size:.75rem}
.grid{display:flex;flex-wrap:wrap;gap:8px}
.box{padding:10px 14px;background:#0d1117;border:1px solid #30363d;border-radius:6px;cursor:pointer;font-size:.8rem;min-width:120px}
.box:hover{border-color:#58a6ff}
.mvid{color:#58a6ff;font-weight:600}
.msg{color:#c9d1d9;font-size:.75rem;margin:4px 0}
.meta{color:#8b949e;font-size:.7rem}
.empty{color:#8b949e;font-style:italic;padding:24px;text-align:center;font-size:.9rem}
.res{color:#8b949e;font-size:.7rem;white-space:nowrap}
</style></head><body>
<div class="container">
<h1>⚡ AAN — Agent Network</h1>
<div class="card">
<h2>What should agents build?</h2>
<textarea id="task" placeholder="Describe what you want built..."></textarea>
<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px">
<select id="cli-select" style="flex:1;padding:8px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:.9rem">
<option value="api">API (direct LLM, best for code)</option>
<option value="opencode">Opencode CL (analysis)</option>
<option value="crush">Crush (analysis)</option>
</select>
<button class="btn" id="go" onclick="launch()">🚀 Launch Agent</button>
</div>
</div>
<div class="card"><h2>Activity</h2><div class="feed" id="feed"><div class="empty">No agents yet</div></div></div>
<div class="card"><h2>Versions</h2><div class="grid" id="grid"><div class="empty">No versions yet</div></div></div>
</div>
<script>
const $=(id)=>document.getElementById(id);
const task=$('task'),go=$('go'),feed=$('feed'),grid=$('grid');

async function load(){
  try{
    const r=await fetch('/api/versions');
    const d=await r.json();
    render(d.versions||[],d.agents||[],window._ri||[]);
  }catch(e){}
  try{
    const r=await fetch('/api/config');
    const d=await r.json();
    if(d.cli_agent) $('cli-select').value=d.cli_agent;
  }catch(e){}
  await loadResources();
}
function render(versions,agents,resources){
  window._lv=versions;window._la=agents;
  // Build res map: version_id -> process
  const rmap={};
  if(resources) for(const p of resources){
    for(const a of agents||[]){
      if(p.command&&p.command.includes(a.version)){rmap[a.version]=p;break}
    }
    for(const v of versions||[]){
      if(p.command&&p.command.includes(v.id)){rmap[v.id]=p;break}
    }
  }
  if(agents&&agents.length){
    feed.innerHTML=agents.map(a=>{
      const r=rmap[a.version];
      const cpu=r?r.cpu.toFixed(1):'—';
      const mem=r?r.mem.toFixed(1):'—';
      return `<div class="entry"><span class="vid">${a.version}</span><span class="task">${esc(a.task||a.version)}</span><span class="tag t${a.status}">${a.status}</span><span class="res">CPU ${cpu}% / RAM ${mem}%</span><span class="time">${a.started?new Date(a.started+'Z').toLocaleTimeString():''}</span></div>`
    }).join('');
  }else feed.innerHTML='<div class="empty">No agents yet</div>';
  if(versions&&versions.length){
    grid.innerHTML=versions.map(v=>{
      const r=rmap[v.id];
      const cpu=r?r.cpu.toFixed(1):'—';
      const mem=r?r.mem.toFixed(1):'—';
      return `<div class="box" onclick="window.location='/${v.id}'"><div class="mvid">${v.id}</div><div class="msg">${esc(v.message).slice(0,50)}</div><div class="meta">${v.created_by} · CPU ${cpu}% · RAM ${mem}%</div></div>`
    }).join('');
  }else grid.innerHTML='<div class="empty">No versions yet</div>';
}

async function launch(){
  const t=task.value.trim();if(!t||go.disabled)return;
  go.disabled=true;go.textContent='⏳';
  const cli=$('cli-select').value;
  // Update config
  await fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cli_agent:cli})});
  // Launch task
  await fetch('/api/agents/launch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task:t})});
  task.value='';go.disabled=false;go.textContent='🚀 Launch Agent';
}

// Initial load
load();

// Resource polling
async function loadResources(){
  try{
    const r=await fetch('/api/resources');
    const d=await r.json();
    window._ri=d.processes||[];
    render(window._lv||[],window._la||[],window._ri);
  }catch(e){}
}
setInterval(loadResources,5000);

// SSE for live updates
const es=new EventSource('/api/events');
es.onmessage=function(e){
  try{
    const d=JSON.parse(e.data);
    render(d.versions||[],d.agents||[],window._ri||[]);
  }catch(ex){}
};
es.onerror=function(){/* will reconnect automatically */};

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
</script></body></html>
