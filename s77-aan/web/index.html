<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Version Registry</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f5;color:#1a1a1a;line-height:1.5}
.container{max-width:1200px;margin:0 auto;padding:16px}
header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
header h1{font-size:1.4rem;font-weight:700}
header .sub{font-size:0.8rem;color:#888}
.main{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:768px){.main{grid-template-columns:1fr}}
.panel{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:20px}
.panel h2{font-size:.8rem;margin-bottom:12px;color:#666;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.panel h2 .count{font-weight:400;color:#aaa;font-size:.75rem}
hr{border:none;border-top:1px solid #eee;margin:16px 0}

/* version list */
.vlist{max-height:60vh;overflow-y:auto}
.ventry{padding:12px;border:1px solid #e8e8e8;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:border-color .15s,background .15s}
.ventry:hover{border-color:#3b82f6}
.ventry.sel{border-color:#3b82f6;background:#eff6ff}
.ventry .vid{font-weight:600;font-family:ui-monospace,monospace;font-size:.9rem;display:flex;align-items:center;gap:6px}
.ventry .vmsg{font-size:.82rem;color:#555;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ventry .vmeta{font-size:.72rem;color:#999;margin-top:2px}
.tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.tag{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;background:#eef2ff;color:#4338ca;border-radius:5px;font-size:.72rem;font-weight:500}
.tag.live{background:#d1fae5;color:#065f46;font-weight:600}
.badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:5px;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.b-live{background:#d1fae5;color:#065f46}
.b-draft{background:#f3f4f6;color:#6b7280}
.b-review{background:#fef3c7;color:#92400e}

/* detail */
.df{margin-bottom:14px}
.df label{font-size:.72rem;color:#888;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.df .val{margin-top:2px;font-size:.9rem;word-break:break-word}

/* buttons */
.btn{padding:8px 18px;border:none;border-radius:7px;cursor:pointer;font-size:.85rem;font-weight:500;transition:background .15s,opacity .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#3b82f6;color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-primary:disabled{background:#93c5fd;cursor:not-allowed}
.btn-success{background:#10b981;color:#fff}
.btn-success:hover{background:#059669}
.btn-success:disabled{background:#6ee7b7;cursor:not-allowed}
.btn-outline{background:transparent;color:#3b82f6;border:1px solid #3b82f6}
.btn-outline:hover{background:#eff6ff}
.btn-sm{padding:5px 12px;font-size:.78rem}

/* forms */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:.75rem;color:#666;margin-bottom:3px;font-weight:500}
.fg input,.fg textarea{width:100%;padding:8px 12px;border:1px solid #d1d5db;border-radius:7px;font-size:.85rem;font-family:inherit;transition:border-color .15s}
.fg input:focus,.fg textarea:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.fg textarea{resize:vertical;min-height:60px}
.fg-row{display:flex;gap:8px;align-items:end}
.fg-row .fg{flex:1;margin-bottom:0}

/* status toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:.85rem;font-weight:500;z-index:100;display:none;box-shadow:0 4px 12px rgba(0,0,0,.12);max-width:90vw;text-align:center}
#toast.err{display:block;background:#fee2e2;color:#991b1b}
#toast.ok{display:block;background:#d1fae5;color:#065f46}

/* empty state */
.empty{color:#aaa;font-size:.85rem;text-align:center;padding:24px 0}

/* detail actions area */
#detail-actions{margin-top:16px}
#detail-actions .action-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}

/* live indicator dot */
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.dot-live{background:#10b981}
.dot-draft{background:#9ca3af}
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1>Version Registry</h1>
      <div class="sub">Manage versions, tags, and promotions</div>
    </div>
    <span id="live-badge" style="font-size:.82rem;color:#888"></span>
  </header>

  <div class="main">

    <!-- LEFT: version list + create form -->
    <div class="panel">
      <h2>Versions <span class="count" id="version-count"></span></h2>
      <div class="vlist" id="version-list"><div class="empty">Loading...</div></div>
      <hr>
      <h2>Create Version</h2>
      <div class="fg">
        <label for="new-msg">Message</label>
        <textarea id="new-msg" placeholder="What changed?"></textarea>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label for="new-by">Created by</label>
          <input type="text" id="new-by" value="web">
        </div>
        <button class="btn btn-primary" onclick="createVersion()">Create</button>
      </div>
    </div>

    <!-- RIGHT: detail + actions -->
    <div class="panel">
      <h2>Details</h2>
      <div id="version-detail">
        <div class="empty">Select a version to view details</div>
      </div>
      <div id="detail-actions" hidden>
        <hr>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-success" id="btn-promote" onclick="promoteLive()">Promote to Live</button>
          <button class="btn btn-outline btn-sm" onclick="updateMsg()">Edit message</button>
        </div>
        <hr>
        <h2>Add Tag</h2>
        <div class="fg-row">
          <div class="fg">
            <label for="tag-name">Tag name</label>
            <input type="text" id="tag-name" placeholder="e.g. ui, bugfix, api">
          </div>
          <button class="btn btn-primary btn-sm" onclick="addTag()">Add</button>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
let selectedId = null;
let versions = [];

// ── helpers ──────────────────────────────────────────────────────────

function qs(s, p){return(p||document).querySelector(s)}
function qsa(s, p){return(p||document).querySelectorAll(s)}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function toast(msg, type){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className=type;
  clearTimeout(t._hide);
  t._hide=setTimeout(()=>{t.style.display='none'},3500);
}

async function api(method, url, body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(url,opts);
  return res.json();
}

// ── data fetching ────────────────────────────────────────────────────

async function fetchVersions(){
  try{
    versions=await api('GET','/api/versions');
    render();
  }catch(e){
    console.error('fetch versions failed',e);
  }
}

async function fetchLive(){
  try{
    const v=await api('GET','/api/versions');  // same endpoint
    const live=v.find(x=>x.live===1);
    qs('#live-badge').textContent=live?`Live: ${live.id}`:'No live version';
  }catch(_){}
}

// ── render ───────────────────────────────────────────────────────────

function render(){
  renderList();
  if(selectedId&&!versions.find(v=>v.id===selectedId))selectedId=null;
  renderDetail();
  qs('#version-count').textContent=`(${versions.length})`;
}

function renderList(){
  const el=qs('#version-list');
  if(!versions.length){
    el.innerHTML='<div class="empty">No versions yet. Create one!</div>';
    return;
  }
  el.innerHTML=versions.map(v=>{
    const sel=v.id===selectedId?' sel':'';
    const liveDot=v.live?'<span class="dot dot-live"></span>':'';
    const badge=v.live?'<span class="badge b-live">LIVE</span>':'';
    const tags=(v.tags||[]).map(t=>`<span class="tag">${esc(t.name)}</span>`).join('');
    return `<div class="ventry${sel}" data-id="${v.id}">
      <div class="vid">${liveDot}${esc(v.id)} ${badge}</div>
      <div class="vmsg">${esc(v.message)}</div>
      <div class="vmeta">${esc(v.created_by)} &middot; ${v.created_at||''}</div>
      ${tags?`<div class="tags">${tags}</div>`:''}
    </div>`;
  }).join('');

  // click handler via delegation
  el.querySelectorAll('.ventry').forEach(el=>{
    el.addEventListener('click',()=>selectVersion(el.dataset.id));
  });
}

function renderDetail(){
  const el=qs('#version-detail');
  const actions=qs('#detail-actions');
  const v=versions.find(x=>x.id===selectedId);

  if(!v){
    el.innerHTML='<div class="empty">Select a version to view details</div>';
    actions.hidden=true;
    return;
  }

  const liveBadge=v.live?'<span class="badge b-live">LIVE</span>':'';
  const tags=(v.tags||[]).map(t=>`<span class="tag">${esc(t.name)}</span>`).join('')||'<span style="color:#999;font-size:.82rem">none</span>';

  el.innerHTML=`
    <div class="df"><label>ID</label><div class="val" style="font-family:monospace;font-weight:600">${esc(v.id)} ${liveBadge}</div></div>
    <div class="df"><label>Message</label><div class="val" id="detail-msg">${esc(v.message)}</div></div>
    <div class="df"><label>Created by</label><div class="val">${esc(v.created_by)}</div></div>
    <div class="df"><label>Status</label><div class="val"><span class="badge b-${v.status}">${esc(v.status)}</span></div></div>
    <div class="df"><label>Created at</label><div class="val">${v.created_at||'-'}</div></div>
    <div class="df"><label>Tags</label><div class="tags" style="margin-top:4px">${tags}</div></div>
  `;

  qs('#btn-promote',actions).disabled=v.live===1;
  actions.hidden=false;
}

// ── actions ──────────────────────────────────────────────────────────

async function selectVersion(id){
  selectedId=id;
  renderList();
  renderDetail();
}

async function createVersion(){
  const msg=qs('#new-msg').value.trim();
  const by=qs('#new-by').value.trim()||'web';
  if(!msg){toast('Message is required','err');return}
  const data=await api('POST','/api/versions',{message:msg,created_by:by});
  if(data.error){toast(data.error,'err');return}
  qs('#new-msg').value='';
  toast('Version created!','ok');
  await fetchVersions();
  selectVersion(data.id);
}

async function promoteLive(){
  if(!selectedId)return;
  const data=await api('POST',`/api/versions/${selectedId}/live`);
  if(data.error){toast(data.error,'err');return}
  toast('Promoted to live!','ok');
  await fetchVersions();
  await fetchLive();
}

async function updateMsg(){
  if(!selectedId)return;
  const v=versions.find(x=>x.id===selectedId);
  if(!v)return;
  const msg=prompt('Update message:',v.message);
  if(msg===null||msg.trim()===''||msg.trim()===v.message)return;
  const data=await api('PUT',`/api/versions/${selectedId}`,{message:msg.trim()});
  if(data.error){toast(data.error,'err');return}
  toast('Message updated','ok');
  await fetchVersions();
}

async function addTag(){
  if(!selectedId)return;
  const name=qs('#tag-name').value.trim();
  if(!name){toast('Tag name required','err');return}
  // ensure tag exists
  await api('POST','/api/tags',{name,created_by:'web'});
  const data=await api('POST',`/api/versions/${selectedId}/tags`,{tag_name:name});
  if(data.error){toast(data.error,'err');return}
  qs('#tag-name').value='';
  toast('Tag added!','ok');
  await fetchVersions();
}

// ── event-driven updates (SSE) ────────────────────────────────────────

const evtSource = new EventSource('/api/events');
evtSource.onmessage = (e) => {
  const data = JSON.parse(e.data);
  versions = data.versions || [];
  liveId = data.live_id;
  renderVersions();
};

// ── init ─────────────────────────────────────────────────────────────

fetchVersions();
fetchLive();
</script>
</body>
</html>
