<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width"/>
<title>Proxy Watchdog</title>
<style>
body{background:#111;color:#0f0;font-family:monospace;padding:10px;font-size:14px}
.ok{color:#0f0}.idle{color:#ff0}.err{color:#f00}.info{color:#0af}
table{width:100%;border-collapse:collapse}
td{padding:4px 8px;border-bottom:1px solid #222;font-size:13px}
th{padding:6px 8px;border-bottom:2px solid #0f0;text-align:left;color:#0af}
.bar{height:6px;background:#333;border-radius:3px;margin:4px 0}
.bar-fill{height:6px;background:#0f0;border-radius:3px;transition:width 1s}
.status-on{color:#0f0}.status-off{color:#ff0}
</style>
</head>
<body>
<h2>🔍 Proxy Watchdog</h2>
<p>Upstream: {{UPSTREAM}}</p>

<h3>🤖 Agentes</h3>
<table>
<tr><th>Agente</th><th>Estado</th><th>Última request</th></tr>
{{AGENTS_ROWS}}
</table>

<h3>📋 Actividad reciente</h3>
<table>
<tr><th>Hora</th><th>Evento</th></tr>
{{LOG_ROWS}}
</table>
</body>
</html>
