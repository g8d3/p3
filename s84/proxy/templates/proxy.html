<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width"/>
<title>Proxy Watchdog</title>
<style>
body{background:#111;color:#ddd;font-family:monospace;padding:10px;font-size:13px}
.ok{color:#0f0}.idle{color:#ff0}.err{color:#f00}.info{color:#0af}
table{width:100%;border-collapse:collapse}
td{padding:4px 6px;border-bottom:1px solid #222;font-size:12px;vertical-align:top}
th{padding:6px 6px;border-bottom:2px solid #0f0;text-align:left;color:#0af}
.snip{color:#888;font-size:11px}
.status-on{color:#0f0}.status-off{color:#ff0}
h3{margin:20px 0 8px 0;color:#0af;font-size:15px}
p{margin:4px 0}
</style>
</head>
<body>
<h2>🔍 Proxy Watchdog</h2>
<p>Upstream: {{UPSTREAM}} | <span id="ts">-</span></p>

<h3>🤖 Agentes</h3>
<table id="agents-tbl">
<tr><th>Agente</th><th>Estado</th><th>PID</th><th>CPU</th><th>RAM</th><th>Visto</th></tr>
{{AGENTS_ROWS}}
</table>

<h3>📋 Actividad reciente</h3>
<table id="log-tbl">
<tr><th>Hora</th><th>Agente</th><th>Modelo</th><th>Req</th><th>Resp</th><th>ms</th></tr>
{{LOG_ROWS}}
</table>

<script>
function esc(s) { return String(s||'').replace(/[&<>"']/g,'') }
function refresh() {
  fetch('/health').then(r=>r.json()).then(h => {
    document.getElementById('ts').textContent = h.timestamp;
    // Agents table
    let ag = '<tr><th>Agente</th><th>Estado</th><th>PID</th><th>CPU</th><th>RAM</th><th>Visto</th></tr>';
    if (h.agents) {
      for (const [name, info] of Object.entries(h.agents)) {
        const icon = info.idle ? '🟡' : '🟢';
        ag += `<tr class="${info.idle?'idle':'ok'}"><td>${esc(name).slice(0,6)}</td><td>${icon} ${esc(info.status)}</td><td style="color:#888">${info.pid||'-'}</td><td style="color:#888">${info.cpu||'-'}%</td><td style="color:#888">${info.mem_pct||'-'}%</td><td style="color:#666">${info.last_seen_s||info.last_s||'-'}s</td></tr>`;
      }
    }
    if (!h.agents || Object.keys(h.agents).length===0) ag += '<tr><td colspan="6" style="color:#666">—</td></tr>';
    document.getElementById('agents-tbl').innerHTML = ag;
    // Log table
    let lg = '<tr><th>Hora</th><th>Agente</th><th>Modelo</th><th>Req</th><th>Resp</th><th>ms</th></tr>';
    if (h.logs) {
      for (const e of h.logs) {
        const cls = e.type==='http'?(e.status==='200'?'ok':'err'):'info';
        if (e.type==='http') {
          lg += `<tr class="${cls}"><td>${esc(e.t)}</td><td>${esc(e.agent).slice(0,10)}</td><td>${esc(e.model)}</td><td class="snip">${esc(e.req)}</td><td class="snip">${esc(e.resp)}</td><td style="text-align:right">${e.ms||''}</td></tr>`;
        } else {
          lg += `<tr class="${cls}"><td>${esc(e.t)}</td><td colspan="4">${esc(e.msg)}</td><td></td></tr>`;
        }
      }
    }
    if (!h.logs || h.logs.length===0) lg += '<tr><td colspan="6" style="color:#666">—</td></tr>';
    document.getElementById('log-tbl').innerHTML = lg;
  }).catch(()=>{});
}
setInterval(refresh, 3000);
refresh();
</script>
</body>
</html>
