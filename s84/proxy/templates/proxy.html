<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Proxy Watchdog</title>
<style>
body{background:#111;color:#ddd;font-family:monospace;padding:10px;font-size:13px}
.ok{color:#0f0}.idle{color:#ff0}.never{color:#ff0}.err{color:#f00}.info{color:#0af}
table{width:100%;border-collapse:collapse}
td{padding:4px 6px;border-bottom:1px solid #222;font-size:12px;vertical-align:top}
th{padding:6px 6px;border-bottom:2px solid #0f0;text-align:left;color:#0af}
.snip{color:#888;font-size:11px}
.status-on{color:#0f0}.status-off{color:#ff0}
h3{margin:20px 0 8px 0;color:#0af;font-size:15px}
p{margin:4px 0}
.dbtn{cursor:pointer;color:#0af;text-decoration:none;font-size:11px;padding:0 4px}
.detail-panel{display:none;background:#1a1a2e;border:1px solid #333;border-radius:4px;padding:10px;margin:6px 0;font-size:11px;max-height:400px;overflow:auto;white-space:pre-wrap;word-break:break-all;color:#ccc}
.detail-panel .hdr{color:#0af;font-weight:bold;margin:8px 0 4px}
.detail-panel .key{color:#888}
</style>
</head>
<body>
<h2>🔍 Proxy Watchdog</h2>
<p>Upstream: <span id="upstream">proxy</span> | <span id="ts">-</span> | <a href="#" onclick="fetch('/clear').then(r=>r.json()).then(()=>{});return false" style="color:#f60;text-decoration:none">✕ limpiar log</a></p>

<h3>🤖 Agentes</h3>
<table id="agents-tbl">
<tr><th>Agente</th><th>Estado</th><th>PID</th><th>CPU</th><th>RAM</th><th>Visto</th></tr>
<tr><td colspan="6" style="color:#666">Cargando...</td></tr>
</table>

<h3>📋 Actividad reciente</h3>
<div id="detail-panel" class="detail-panel"></div>
<table id="log-tbl">
<tr><th>Hora</th><th>Agente</th><th>Modelo</th><th>Req</th><th>Resp</th><th>ms</th><th>Det</th></tr>
<tr><td colspan="7" style="color:#666">Cargando...</td></tr>
</table>

<script>
const _INIT = {{INIT_DATA}};
function esc(s) { return String(s||'').replace(/[&<>"']/g,'') }
function fmt(s) {
  if (s===undefined || s===null || s<0 || s>1e8) return '-';
  if (s < 60) return s+'s';
  if (s < 3600) return Math.floor(s/60)+'m';
  if (s < 86400) return Math.floor(s/3600)+'h';
  return Math.floor(s/86400)+'d '+Math.floor((s%86400)/3600)+'h';
}
let _agents = {};

function renderAgents() {
  let ag = '<tr><th>Agente</th><th>Estado</th><th>PID</th><th>CPU</th><th>RAM</th><th>Visto</th></tr>';
  for (const [name, info] of Object.entries(_agents)) {
    const never = info.never_active;
    const icon = never ? '🟡' : (info.idle ? '🟡' : '🟢');
    const cls = never ? 'idle' : (info.idle ? 'idle' : 'ok');
    const seen = never ? '<span style="color:#888">nunca</span>' : fmt(info.last_s);
    ag += `<tr class="${cls}" data-agent="${esc(name)}"><td>${esc(name).slice(0,6)}</td><td>${icon} ${esc(info.status)}</td><td style="color:#888">${info.pid||'-'}</td><td style="color:#888">${info.cpu||'-'}%</td><td style="color:#888">${info.mem_pct||'-'}%</td><td style="color:#666">${seen}</td></tr>`;
  }
  if (Object.keys(_agents).length===0) ag += '<tr><td colspan="6" style="color:#666">—</td></tr>';
  document.getElementById('agents-tbl').innerHTML = ag;
}

function renderLogs(logs) {
  logs = logs || (_store ? _store.logs : []);
  let lg = '<tr><th>Hora</th><th>Agente</th><th>Modelo</th><th>Req</th><th>Resp</th><th>ms</th><th>Det</th></tr>';
  for (const e of logs) {
    const cls = e.type==='http'?(e.status==='200'?'ok':'err'):'info';
    if (e.type==='http') {
      const did = e.detail_id || '';
      const btn = did ? `<a class="dbtn" onclick="showDetail('${esc(did)}')">📋</a>` : '';
      lg += `<tr class="${cls}"><td>${esc(e.t)}</td><td>${esc(e.agent).slice(0,10)}</td><td>${esc(e.model)}</td><td class="snip">${esc(e.req)}</td><td class="snip">${esc(e.resp)}</td><td style="text-align:right">${e.ms||''}</td><td>${btn}</td></tr>`;
    } else {
      const msg = esc(e.msg||'').slice(0,40);
      lg += `<tr class="${cls}"><td>${esc(e.t)}</td><td style="color:#888">${msg}</td><td style="color:#444">—</td><td style="color:#444">—</td><td style="color:#444">—</td><td style="color:#444">—</td><td style="color:#444">—</td></tr>`;
    }
  }
  if (!logs.length) lg += '<tr><td colspan="7" style="color:#666">—</td></tr>';
  document.getElementById('log-tbl').innerHTML = lg;
}

function render(h) {
  document.getElementById('ts').textContent = h.timestamp;
  document.getElementById('upstream').textContent = h.upstream || 'proxy';
  _agents = h.agents || {};
  renderAgents();
  renderLogs(h.logs);
}
function showDetail(did) {
  const panel = document.getElementById('detail-panel');
  panel.innerHTML = '<span style="color:#888">Cargando detalle...</span>';
  panel.style.display = 'block';
  const controller = new AbortController();
  setTimeout(() => controller.abort(), 5000);
  fetch('/detail/'+encodeURIComponent(did), {signal: controller.signal}).then(r=>r.text()).then(txt => {
    let d;
    try { d = JSON.parse(txt); } catch(e) { panel.innerHTML = '<span style="color:#f00">Invalid detail response</span>'; return; }
    if (!d || !d.req_headers) { panel.innerHTML = '<span style="color:#f60">No details<button onclick="this.parentElement.style.display=\'none\'" style="float:right">✕</button></span>'; return; }
    let h = '<button onclick="this.parentElement.style.display=\'none\'" style="float:right;background:none;border:none;color:#f00;font-size:16px;cursor:pointer">✕</button>';
    h += '<div class="hdr">📤 Request Headers</div>';
    for (const [k,v] of Object.entries(d.req_headers)) h += `<span class="key">${esc(k)}:</span> ${esc(v)}\n`;
    h += '<div class="hdr">📤 Request Body</div>';
    h += esc(typeof d.req_body==='string'?d.req_body:JSON.stringify(d.req_body,null,2));
    h += '<div class="hdr">📥 Response</div>';
    h += `<span class="key">Status:</span> ${d.resp_status||'-'}\n`;
    for (const [k,v] of Object.entries(d.resp_headers||{})) h += `<span class="key">${esc(k)}:</span> ${esc(v)}\n`;
    h += `<span class="key">Elapsed:</span> ${d.elapsed_ms||'-'}ms\n`;
    h += '<div class="hdr">📥 Response Body (first 2KB)</div>';
    h += esc(d.resp_body||'-');
    panel.innerHTML = h;
    panel.style.display = 'block';
  }).catch(err => { panel.innerHTML = '<span style="color:#f00">Error: ' + esc(err.message) + '<br/><button onclick="this.parentElement.style.display=\'none\'">✕</button></span>'; reportErr(err.message); });
}
// WebSocket con fallback a SSE
let ws = null;
let _store = {agents:{}, logs:[]};

function handleMsg(d) {
  try {
    if (d.type === 'ping') {
      const el = document.getElementById('ts');
      if (el) el.textContent = d.t;
      return;
    }
    if (d.type === 'init') { _store = d; render(d); return; }
    if (d.type === 'log') {
      (_store.logs||[]).unshift(d.entry);
      if (_store.logs.length > 30) _store.logs.pop();
      _agents = _store.agents || {};
      renderLogs(_store.logs);
      return;
    }
    if (d.type === 'idle' && d.agent) {
      const a = (_store.agents||{})[d.agent];
      if (a) { a.idle = true; a.last_s = d.last_s || 0; a.never_active = false; _agents = _store.agents; }
      renderAgents();
      return;
    }
    if (d.type === 'clear') { _store.logs = []; renderLogs([]); }
  } catch(e) {}
}

function connect() {
  const isSecure = location.protocol === 'https:';
  // Try WS first, fallback to SSE after 2s
  const url = (isSecure ? 'wss://' : 'ws://') + location.host + '/ws';
  let wsFallback = setTimeout(() => {
    if (!ws || ws.readyState !== 1) { if (ws) ws.close(); connectSSE(); }
  }, 2000);
  ws = new WebSocket(url);
  ws.onopen = () => { clearTimeout(wsFallback); };
  ws.onmessage = e => { try { handleMsg(JSON.parse(e.data)); } catch(_) {} };
  ws.onclose = () => { if (!wsFallback) setTimeout(connect, 2000); };
  ws.onerror = () => {};
}

function connectSSE() {
  const sse = new EventSource('/events');
  sse.addEventListener('init', e => handleMsg(JSON.parse(e.data)));
  sse.addEventListener('log', e => handleMsg(JSON.parse(e.data)));
  sse.addEventListener('idle', e => handleMsg(JSON.parse(e.data)));
  sse.addEventListener('clear', e => handleMsg(JSON.parse(e.data)));
  sse.addEventListener('ping', e => handleMsg(JSON.parse(e.data)));
  sse.onerror = () => { if (sse.readyState === EventSource.CLOSED) setTimeout(connectSSE, 2000); };
}
// Render initial data immediately (embedded in HTML), no waiting for WS/SSE
if (_INIT && _INIT.agents) { _store = _INIT; render(_INIT); }
connect();

// Report errors via WS or fallback HTTP
function reportErr(msg, url, line) {
  const payload = JSON.stringify({type:'error', msg:String(msg||'').slice(0,200), url:url||'', line:line||0});
  try {
    if (ws && ws.readyState === 1) { ws.send(payload); return; }
  } catch(e) {}
  try { navigator.sendBeacon('/api/report-error', payload); } catch(e) {}
}
window.onerror = (msg, url, line) => reportErr(msg, url, line);
window.addEventListener('unhandledrejection', e => reportErr(e.reason));

document.addEventListener('click', e => { if (!e.target.closest('.detail-panel') && !e.target.closest('.dbtn')) document.getElementById('detail-panel').style.display='none'; });
</script>
</body>
</html>
