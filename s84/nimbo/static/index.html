<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>nimbo</title>
<link rel="stylesheet" href="/mobile.css">
<style>
  .stat-bar { display: flex; gap: var(--gap); padding: 8px 0; font-size: 0.8rem; color: #8b949e; flex-wrap: wrap; }
  .stat-bar span { display: flex; align-items: center; gap: 4px; }
  .stat-bar .val { color: var(--accent); font-weight: 600; }
  .mini-bar { width: 40px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; display: inline-block; vertical-align: middle; }
  .mini-bar .fill { height: 100%; background: var(--accent); border-radius: 2px; }
  .log-entry { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; font-family: monospace; }
  .log-time { color: #8b949e; margin-right: 8px; }
  .log-level { display: inline-block; padding: 0 4px; border-radius: 3px; font-size: 0.7rem; margin-right: 6px; font-weight: 600; }
  .log-level.info { color: var(--accent); background: rgba(88,166,255,0.1); }
  .log-level.error { color: var(--danger); background: rgba(248,81,73,0.1); }
  .log-level.warn { color: var(--warn); background: rgba(210,153,34,0.1); }
</style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <h1 id="app-title">nimbo</h1>
      <span id="ws-status" style="width:8px;height:8px;border-radius:50%;background:#f85149;display:inline-block"></span>
    </header>
    <nav class="app-nav" id="app-nav">
      <div id="sys-stats" class="stat-bar"></div>
    </nav>
    <main class="app-content" id="app-content"></main>
  </div>

  <script src="/ws.js"></script>
  <script src="/crud.js"></script>
  <script>
    const models = (window.__NIMBO_RESOURCES__ || []).filter(m => m !== 'log');

    // ── Configurar modelos especiales ──
    nimbo.crud.config('process', {
      api: '/api/system/processes',
      id: 'pid',
      noCreate: true,
      noEdit: true,
      refresh: 5000,
      actions: [
        { label: '✕', class: 'btn-danger', handler: async (item, btn) => {
          if (!confirm(`Kill ${item.name} (${item.pid})?`)) return;
          btn.disabled = true;
          try { await fetch('/api/system/kill/' + item.pid, {method:'POST'}); btn.textContent = '✓'; }
          catch(e) { btn.textContent = '✗'; }
        }}
      ]
    });

    nimbo.crud.config('command', {
      actions: [
        { label: '▶', class: 'btn-primary', handler: async (item, btn) => {
          btn.disabled = true;
          try {
            const r = await fetch('/api/commands/run/' + item.id, {method:'POST'});
            const d = await r.json();
            alert('stdout:\n' + (d.stdout || '(none)') + '\n\nstderr:\n' + (d.stderr || '(none)'));
          } catch(e) { alert('Error: ' + e.message); }
          btn.disabled = false;
        }}
      ]
    });

    // ── Model-based routing ──
    function switchModel(name) {
      document.querySelectorAll('.app-nav a').forEach(a => a.classList.remove('active'));
      const link = document.querySelector(`.app-nav a[data-model="${name}"]`);
      if (link) link.classList.add('active');
      history.replaceState(null, '', '#' + name);

      if (name === '__logs__') {
        renderLogs();
        return;
      }
      const el = document.getElementById('app-content');
      el.innerHTML = '<div class="card"><p class="text-muted">Loading...</p></div>';
      fetch(`/api/${name}/schema`).then(r => r.json()).then(schema => {
        el.innerHTML = '';
        nimbo.crud.mount(el, name, schema.fields);
      });
    }

    // ── Build nav from models ──
    function buildNav() {
      const nav = document.getElementById('app-nav');
      const stats = document.getElementById('sys-stats');
      nav.innerHTML = '';
      nav.appendChild(stats);
      models.forEach(m => {
        const a = document.createElement('a');
        a.href = '#' + m;
        a.textContent = m;
        a.dataset.model = m;
        a.onclick = (e) => { e.preventDefault(); switchModel(m); };
        nav.appendChild(a);
      });
      const logsLink = document.createElement('a');
      logsLink.href = '#logs';
      logsLink.textContent = 'Logs';
      logsLink.dataset.model = '__logs__';
      logsLink.onclick = (e) => { e.preventDefault(); switchModel('__logs__'); };
      nav.appendChild(logsLink);
    }

    // ── System stats in nav bar ──
    async function updateStats() {
      try {
        const d = await (await fetch('/api/system/resources')).json();
        document.getElementById('sys-stats').innerHTML =
          `<span>CPU <span class="val">${d.cpu}%</span> <span class="mini-bar"><span class="fill" style="width:${d.cpu}%"></span></span></span>` +
          `<span>RAM <span class="val">${Math.round(d.memory.percent)}%</span> <span class="mini-bar"><span class="fill" style="width:${d.memory.percent}%"></span></span></span>` +
          `<span>Disk <span class="val">${Math.round(d.disk.percent)}%</span> <span class="mini-bar"><span class="fill" style="width:${d.disk.percent}%"></span></span></span>`;
      } catch(e) {}
    }

    // ── Logs ──
    let logsInit = false;
    function addLog(level, text) {
      const c = document.getElementById('log-container');
      if (!c) return;
      const el = document.createElement('div');
      el.className = 'log-entry';
      el.innerHTML = `<span class="log-time">${new Date().toLocaleTimeString()}</span><span class="log-level ${level}">${level}</span>${text}`;
      c.appendChild(el);
      c.scrollTop = c.scrollHeight;
    }
    function renderLogs() {
      const el = document.getElementById('app-content');
      el.innerHTML = `
        <div class="card">
          <div class="flex items-center justify-between mb">
            <h3>Live Logs</h3>
            <button class="btn btn-sm" onclick="document.getElementById('log-container').innerHTML=''">Clear</button>
          </div>
          <div id="log-container" style="background:var(--bg);padding:12px;border-radius:var(--radius);max-height:70vh;overflow-y:auto;font-family:monospace;font-size:0.8rem"></div>
        </div>`;
      if (!logsInit) {
        logsInit = true;
        fetch('/api/log/recent').then(r => r.json()).then(h => h.slice(-50).forEach(l => addLog(l.level, l.content))).catch(()=>{});
        nimbo.ws.on('open', () => addLog('info', 'WS connected'));
        nimbo.ws.on('close', () => addLog('warn', 'WS disconnected'));
        nimbo.ws.on('log', msg => addLog(msg.data?.level || 'info', msg.data?.content || JSON.stringify(msg.data)));
        addLog('info', 'Logs ready');
      }
    }

    // ── Init ──
    nimbo.ws.on('open', () => document.getElementById('ws-status').style.background = '#3fb950');
    nimbo.ws.on('close', () => document.getElementById('ws-status').style.background = '#f85149');
    nimbo.ws.connect();
    buildNav();
    updateStats();
    setInterval(updateStats, 5000);

    const initial = location.hash.replace('#', '') || models[0] || '__logs__';
    switchModel(initial);
  </script>
</body>
</html>
