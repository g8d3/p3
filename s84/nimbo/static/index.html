<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>nimbo</title>
<link rel="stylesheet" href="/mobile.css">
<style>
  .log-entry { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; font-family: monospace; }
  .log-time { color: #8b949e; margin-right: 8px; }
  .log-level { display: inline-block; padding: 0 4px; border-radius: 3px; font-size: 0.7rem; margin-right: 6px; font-weight: 600; }
  .log-level.info { color: var(--accent); background: rgba(88,166,255,0.1); }
  .log-level.error { color: var(--danger); background: rgba(248,81,73,0.1); }
  .log-level.warn { color: var(--warn); background: rgba(210,153,34,0.1); }
</style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <h1 id="app-title">nimbo</h1>
      <span id="ws-status" style="width:8px;height:8px;border-radius:50%;background:#f85149;display:inline-block"></span>
    </header>
    <nav class="app-nav" id="app-nav"></nav>
    <main class="app-content" id="app-content"></main>
  </div>

  <script src="/ws.js"></script>
  <script src="/crud.js"></script>
  <script>
    const models = window.__NIMBO_RESOURCES__ || [];

    // ── Config desde decoradores (@app.system, @app.log, @app.run) ──
    const inj = window.__NIMBO_CONFIGS__ || {};
    Object.keys(inj).forEach(name => {
      const cfg = inj[name];
      if (cfg.actions) {
        cfg.actions = cfg.actions.map(a => a.handlerTemplate === 'run' ? {
          label: '▶', class: 'btn-primary', handler: async (item, btn) => {
            btn.disabled = true;
            try { const r=await fetch(`${cfg.api}/run/${item.id}`,{method:'POST'}); const d=await r.json(); alert('stdout:\n'+(d.stdout||'(none)')+'\nstderr:\n'+(d.stderr||'(none)')); }
            catch(e) { alert('Error: '+e.message); }
            btn.disabled = false;
          }
        } : a);
      }
      if (cfg.kill) {
        (cfg.actions = cfg.actions || []).push({ label: '✕', class: 'btn-danger', handler: async (item, btn) => {
          if (!confirm(`Kill ${item.name} (${item.pid})?`)) return;
          btn.disabled = true;
          try { await fetch(`${cfg.api}/${item.pid}`, {method:'DELETE'}); btn.textContent = '✓'; }
          catch(e) { btn.textContent = '✗'; }
        }});
      }
      nimbo.crud.config(name, cfg);
    });

    // ── Model-based routing ──
    let cleanup = null;
    let currentModel = null;
    function switchModel(name) {
      currentModel = name;
      if (cleanup) { cleanup(); cleanup = null; }
      document.querySelectorAll('.app-nav a').forEach(a => a.classList.remove('active'));
      const link = document.querySelector(`.app-nav a[data-model="${name}"]`);
      if (link) link.classList.add('active');
      history.replaceState(null, '', '#' + name);

      const el = document.getElementById('app-content');
      el.innerHTML = '<div class="card"><p class="text-muted">Loading...</p></div>';

      const cfg = nimbo.crud.configs ? nimbo.crud.configs[name] : null;
      const hasInlineFields = cfg && cfg.fields;
      const schemaPromise = hasInlineFields ? Promise.resolve({fields: cfg.fields}) : fetch(`${cfg ? cfg.api : '/api/' + name}/schema`).then(r => r.json());
      const statsPromise = name === 'process' ? fetch('/api/resources').then(r => r.json()) : null;

      Promise.all([schemaPromise, statsPromise].filter(Boolean)).then(([schema, stats]) => {
        if (currentModel !== name) return;
        el.innerHTML = '';
        cleanup = nimbo.crud.mount(el, name, schema.fields);
        if (stats) {
          const s = document.createElement('div');
          s.style.marginBottom = 'var(--gap)';
          s.innerHTML =
            `<div class="stat-grid"><div class="stat-card"><div class="stat-value">${stats.cpu}%</div><div class="stat-label">CPU</div><div class="bar"><div class="bar-fill" style="width:${stats.cpu}%"></div></div></div>` +
            `<div class="stat-card"><div class="stat-value">${Math.round(stats.memory.percent)}%</div><div class="stat-label">RAM</div><div class="bar"><div class="bar-fill" style="width:${stats.memory.percent}%"></div></div></div>` +
            `<div class="stat-card"><div class="stat-value">${Math.round(stats.disk.percent)}%</div><div class="stat-label">Disk</div><div class="bar"><div class="bar-fill" style="width:${stats.disk.percent}%"></div></div></div>` +
            `<div class="stat-card"><div class="stat-value">${(stats.net.bytes_sent / 1e6).toFixed(1)}M</div><div class="stat-label">Net</div></div>`;
          el.prepend(s);
        }
      });
    }

    // ── Build nav from models ──
    function buildNav() {
      const nav = document.getElementById('app-nav');
      nav.innerHTML = '';
      models.forEach(m => {
        const a = document.createElement('a');
        a.href = '#' + m;
        a.textContent = m;
        a.dataset.model = m;
        a.onclick = (e) => { e.preventDefault(); switchModel(m); };
        nav.appendChild(a);
      });

    }

    // ── Init ──
    nimbo.ws.on('open', () => document.getElementById('ws-status').style.background = '#3fb950');
    nimbo.ws.on('close', () => document.getElementById('ws-status').style.background = '#f85149');
    nimbo.ws.connect();
    buildNav();

    const initial = location.hash.replace('#', '') || models[0] || 'log';
    switchModel(initial);
  </script>
</body>
</html>
