<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>nimbo</title>
<link rel="stylesheet" href="/mobile.css">
<style>
  .log-entry { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; font-family: monospace; }
  .log-time { color: #8b949e; margin-right: 8px; }
  .log-level { display: inline-block; padding: 0 4px; border-radius: 3px; font-size: 0.7rem; margin-right: 6px; font-weight: 600; }
  .log-level.info { color: var(--accent); background: rgba(88,166,255,0.1); }
  .log-level.error { color: var(--danger); background: rgba(248,81,73,0.1); }
  .log-level.warn { color: var(--warn); background: rgba(210,153,34,0.1); }
</style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <h1 id="app-title">nimbo</h1>
      <span id="ws-status" style="width:8px;height:8px;border-radius:50%;background:#f85149;display:inline-block"></span>
    </header>
    <nav class="app-nav" id="app-nav"></nav>
    <main class="app-content" id="app-content"></main>
  </div>

  <script src="/ws.js"></script>
  <script src="/crud.js"></script>
  <script>
    const models = (window.__NIMBO_RESOURCES__ || []).filter(m => m !== 'log');

    // ── Configurar modelos especiales ──
    nimbo.crud.config('process', {
      api: '/api/system/processes',
      id: 'pid',
      fields: [{name:'pid',type:'int'},{name:'name',type:'string'},{name:'cpu_percent',type:'float',label:'CPU%'},{name:'memory_percent',type:'float',label:'MEM%'},{name:'status',type:'string'}],
      noCreate: true, noEdit: true, refresh: 5000,
      actions: [
        { label: '✕', class: 'btn-danger', handler: async (item, btn) => {
          if (!confirm(`Kill ${item.name} (${item.pid})?`)) return;
          btn.disabled = true;
          try { await fetch('/api/system/kill/' + item.pid, {method:'POST'}); btn.textContent = '✓'; }
          catch(e) { btn.textContent = '✗'; }
        }}
      ]
    });

    nimbo.crud.config('command', {
      actions: [
        { label: '▶', class: 'btn-primary', handler: async (item, btn) => {
          btn.disabled = true;
          try {
            const r = await fetch('/api/commands/run/' + item.id, {method:'POST'});
            const d = await r.json();
            alert('stdout:\n' + (d.stdout || '(none)') + '\n\nstderr:\n' + (d.stderr || '(none)'));
          } catch(e) { alert('Error: ' + e.message); }
          btn.disabled = false;
        }}
      ]
    });

    // ── Model-based routing ──
    let cleanup = null;
    let currentModel = null;
    function switchModel(name) {
      currentModel = name;
      if (cleanup) { cleanup(); cleanup = null; }
      document.querySelectorAll('.app-nav a').forEach(a => a.classList.remove('active'));
      const link = document.querySelector(`.app-nav a[data-model="${name}"]`);
      if (link) link.classList.add('active');
      history.replaceState(null, '', '#' + name);

      if (name === '__logs__') {
        renderLogs();
        return;
      }
      const el = document.getElementById('app-content');
      el.innerHTML = '<div class="card"><p class="text-muted">Loading...</p></div>';

      const cfg = nimbo.crud.configs ? nimbo.crud.configs[name] : null;
      const hasInlineFields = cfg && cfg.fields;
      const schemaPromise = hasInlineFields ? Promise.resolve({fields: cfg.fields}) : fetch(`/api/${name}/schema`).then(r => r.json());
      const statsPromise = name === 'process' ? fetch('/api/system/resources').then(r => r.json()) : null;

      Promise.all([schemaPromise, statsPromise].filter(Boolean)).then(([schema, stats]) => {
        if (currentModel !== name) return;
        el.innerHTML = '';
        cleanup = nimbo.crud.mount(el, name, schema.fields);
        if (stats) {
          const s = document.createElement('div');
          s.style.marginBottom = 'var(--gap)';
          s.innerHTML =
            `<div class="stat-grid"><div class="stat-card"><div class="stat-value">${stats.cpu}%</div><div class="stat-label">CPU</div><div class="bar"><div class="bar-fill" style="width:${stats.cpu}%"></div></div></div>` +
            `<div class="stat-card"><div class="stat-value">${Math.round(stats.memory.percent)}%</div><div class="stat-label">RAM</div><div class="bar"><div class="bar-fill" style="width:${stats.memory.percent}%"></div></div></div>` +
            `<div class="stat-card"><div class="stat-value">${Math.round(stats.disk.percent)}%</div><div class="stat-label">Disk</div><div class="bar"><div class="bar-fill" style="width:${stats.disk.percent}%"></div></div></div>` +
            `<div class="stat-card"><div class="stat-value">${(stats.net.bytes_sent / 1e6).toFixed(1)}M</div><div class="stat-label">Net</div></div>`;
          el.prepend(s);
        }
      });
    }

    // ── Build nav from models ──
    function buildNav() {
      const nav = document.getElementById('app-nav');
      nav.innerHTML = '';
      models.forEach(m => {
        const a = document.createElement('a');
        a.href = '#' + m;
        a.textContent = m;
        a.dataset.model = m;
        a.onclick = (e) => { e.preventDefault(); switchModel(m); };
        nav.appendChild(a);
      });
      const logsLink = document.createElement('a');
      logsLink.href = '#logs';
      logsLink.textContent = 'Logs';
      logsLink.dataset.model = '__logs__';
      logsLink.onclick = (e) => { e.preventDefault(); switchModel('__logs__'); };
      nav.appendChild(logsLink);
    }

    // ── System stats in nav bar ──
    async function updateStats() {
      try {
        const d = await (await fetch('/api/system/resources')).json();
        document.getElementById('sys-stats').innerHTML =
          `<span>CPU <span class="val">${d.cpu}%</span> <span class="mini-bar"><span class="fill" style="width:${d.cpu}%"></span></span></span>` +
          `<span>RAM <span class="val">${Math.round(d.memory.percent)}%</span> <span class="mini-bar"><span class="fill" style="width:${d.memory.percent}%"></span></span></span>` +
          `<span>Disk <span class="val">${Math.round(d.disk.percent)}%</span> <span class="mini-bar"><span class="fill" style="width:${d.disk.percent}%"></span></span></span>`;
      } catch(e) {}
    }

    // ── Logs ──
    let logsInit = false;
    function renderLogs() {
      const el = document.getElementById('app-content');
      el.innerHTML = `
        <div class="card">
          <div class="flex items-center justify-between mb">
            <h3>Live Logs</h3>
            <button class="btn btn-sm" onclick="document.getElementById('log-container').innerHTML=''">Clear</button>
          </div>
          <div id="log-container" style="background:var(--bg);padding:12px;border-radius:var(--radius);max-height:70vh;overflow-y:auto;font-family:monospace;font-size:0.8rem"></div>
        </div>`;
      if (!logsInit) {
        logsInit = true;
        nimbo.ws.on('open', () => {
          nimbo.ws.send(JSON.stringify({type:'log',data:{level:'info',content:'WS connected',source:'client'}}));
        });
        nimbo.ws.on('close', () => {
          // Can't send via WS when closed; server doesn't know. That's OK.
        });
        nimbo.ws.on('log', msg => {
          const c = document.getElementById('log-container');
          if (!c || !msg.data) return;
          const el=document.createElement('div');el.className='log-entry';
          el.innerHTML=`<span class="log-time">${new Date().toLocaleTimeString()}</span><span class="log-level ${msg.data.level||'info'}">${msg.data.level||'info'}</span>${msg.data.content||JSON.stringify(msg.data)}`;
          c.appendChild(el);c.scrollTop=c.scrollHeight;
        });
      }
      // Load recent logs from DB (persisted events while away)
      fetch('/api/log/recent').then(r=>r.json()).then(h=>{
        const c=document.getElementById('log-container');
        if(!c)return;
        h.forEach(l=>{
          if(c.querySelector(`[data-i="${l.id}"]`))return;
          const el=document.createElement('div');el.className='log-entry';el.dataset.i=l.id;
          el.innerHTML=`<span class="log-time">${new Date().toLocaleTimeString()}</span><span class="log-level ${l.level}">${l.level}</span>${l.content}`;
          c.appendChild(el);c.scrollTop=c.scrollHeight;
        });
      }).catch(()=>{});
    }

    // ── Init ──
    nimbo.ws.on('open', () => document.getElementById('ws-status').style.background = '#3fb950');
    nimbo.ws.on('close', () => document.getElementById('ws-status').style.background = '#f85149');
    nimbo.ws.connect();
    buildNav();
    updateStats();
    setInterval(updateStats, 5000);

    const initial = location.hash.replace('#', '') || models[0] || '__logs__';
    switchModel(initial);
  </script>
</body>
</html>
