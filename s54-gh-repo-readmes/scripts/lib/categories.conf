# Classification patterns for AI agent repos
# Format: CATEGORY_NAME: regex_pattern
# First match wins. Order: most specific first.
# Patterns are case-insensitive, checked against description+topics+readme+name

Agent Runtime / Sandbox: runtime\s+(for|and)\s+(autonomous\s+)?ai
Agent Runtime / Sandbox: sandboxed\s+execution|microvm|cube.sandbox
Agent Runtime / Sandbox: portable\s+operating\s+system\s+for\s+ai
Agent Runtime / Sandbox: webassembly\s+and\s+v8\s+isolates
Agent Runtime / Sandbox: safe,\s*private\s+runtime

Network Observability: network.observability
Network Observability: ebpf.powered.network
Network Observability: kubernetes.traffic|api.traffic|packet\s*capture

Office / Productivity: library\s+for\s+(reading\s+and\s+writing\s+)?microsoft\s+excel
Office / Productivity: google.workspace.cli|spreadsheet|excelize
Office / Productivity: lark|feishu\s+cli

Browser / Web Automation: browser\s+automation\s+(cli\s+)?for\s+ai
Browser / Web Automation: headless\s+browser\s+for\s+ai
Browser / Web Automation: browser\s+automation\s+for\s+ai\s+agents\s+and\s+humans

