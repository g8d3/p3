Agent Orchestration / Workflow: declarative\s+yaml.*multi.agent
Agent Orchestration / Workflow: loop\s+until.*task.*done

CLI / Terminal Tools: all.in.one\s+llm\s+cli
CLI / Terminal Tools: one\s+cli\s+for\s+all
CLI / Terminal Tools: cli\s+tool.*(llm|agent|developer)
