MCP / Tools Protocol: mcp\s+server|model\s+context\s+protocol
MCP / Tools Protocol: toolbox\s+for\s+databases
MCP / Tools Protocol: supercharge\s+ai\s+agents.*safely

Agent DevKit / SDK: agent\s+development\s+kit|adk\b
Agent DevKit / SDK: code.first.*toolkit.*building.*ai\s+agents
