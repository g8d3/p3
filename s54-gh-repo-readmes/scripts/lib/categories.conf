Database / Data Warehouse: data\s+agent\s+ready\s+warehouse
Database / Data Warehouse: portable\s+accelerated\s+sql
Database / Data Warehouse: \btidb\b|\bdatabend\b

Security / Pentesting: penetration\s+testing|pentest|vulnerab|exploit
Security / Pentesting: zero.knowledge\s+secret
Security / Pentesting: cyberpunk\s+overseer

Memory / Knowledge / RAG: memory\s+layer\s+for\s+ai\s+agents
Memory / Knowledge / RAG: persistent\s+memory.*(ai\s+)?agents
